<img src="img/cat.gif" class="cat-gif" id="cat-gif" alt="cat">

<script>
  const cat = document.getElementById('cat-gif');
  let mouseX = -200, mouseY = -200;
  let catX = -200, catY = -200;
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX - 40;
    mouseY = e.clientY - 40;
  });
  function animate() {
    catX += (mouseX - catX) * 0.15;
    catY += (mouseY - catY) * 0.15;
    cat.style.left = catX + 'px';
    cat.style.top  = catY + 'px';
    requestAnimationFrame(animate);
  }
  animate();
</script>
